<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Nền gradient xanh dương -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003d99;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0056b3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#007bff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="phoneGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f0ff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.25)"/>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Nền hình vuông bo góc (maskable safe zone) -->
  <rect width="512" height="512" rx="108" fill="url(#bgGrad)"/>

  <!-- Vòng trang trí mờ -->
  <circle cx="420" cy="92" r="120" fill="rgba(255,255,255,0.05)"/>
  <circle cx="90" cy="420" r="100" fill="rgba(255,255,255,0.05)"/>

  <!-- ══ ĐIỆN THOẠI ══ -->
  <g filter="url(#shadow)" transform="translate(156, 100)">
    <!-- Thân điện thoại -->
    <rect x="0" y="0" width="180" height="295" rx="28"
          fill="url(#phoneGrad)" opacity="0.97"/>

    <!-- Màn hình -->
    <rect x="12" y="32" width="156" height="215" rx="8"
          fill="#003d99" opacity="0.15"/>
    <rect x="14" y="34" width="152" height="211" rx="7"
          fill="#007bff" opacity="0.12"/>

    <!-- Camera nhỏ trên -->
    <circle cx="90" cy="17" r="7" fill="#ccd9ff" opacity="0.6"/>

    <!-- Nút home dưới -->
    <rect x="67" y="264" width="46" height="12" rx="6"
          fill="#ccd9ff" opacity="0.5"/>

    <!-- Chữ PV trên màn hình -->
    <text x="90" y="165"
          font-family="Arial Black, Arial"
          font-weight="900"
          font-size="72"
          fill="white"
          opacity="0.9"
          text-anchor="middle"
          dominant-baseline="middle">PV</text>

    <!-- Gạch dưới chữ PV -->
    <rect x="30" y="180" width="120" height="3" rx="1.5"
          fill="white" opacity="0.4"/>

    <!-- Dòng chữ nhỏ -->
    <text x="90" y="205"
          font-family="Arial, sans-serif"
          font-size="14"
          fill="white"
          opacity="0.6"
          text-anchor="middle">MOBILE SERVICE</text>
  </g>

  <!-- ══ CỜ LÊ TRÁI ══ -->
  <g transform="rotate(-40, 120, 230)" filter="url(#shadow)">
    <!-- Thân cờ lê -->
    <rect x="85" y="215" width="80" height="22" rx="11"
          fill="#FFD700"/>
    <!-- Đầu cờ lê tròn -->
    <circle cx="85" cy="226" r="22" fill="#FFD700"/>
    <circle cx="85" cy="226" r="13" fill="#003d99"/>
    <!-- Miệng cờ lê -->
    <rect x="63" y="215" width="14" height="22" rx="3" fill="#FFD700"/>
  </g>

  <!-- ══ TUA VÍT PHẢI ══ -->
  <g transform="rotate(40, 390, 230)" filter="url(#shadow)">
    <!-- Thân tua vít -->
    <rect x="330" y="215" width="90" height="18" rx="9"
          fill="#FFD700"/>
    <!-- Đầu tua vít dẹt -->
    <rect x="415" y="210" width="18" height="28" rx="3"
          fill="#FFD700"/>
    <!-- Chuôi tua vít -->
    <rect x="328" y="218" width="24" height="12" rx="6"
          fill="#e6be00"/>
  </g>

  <!-- ══ DẤU TÍCH / KIỂM TRA ══ (góc dưới phải - biểu tượng hoàn thành) -->
  <g transform="translate(350, 360)">
    <circle cx="36" cy="36" r="36" fill="rgba(255,255,255,0.15)"
            stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <polyline points="14,36 28,50 58,22"
              fill="none"
              stroke="white"
              stroke-width="6"
              stroke-linecap="round"
              stroke-linejoin="round"
              opacity="0.9"/>
  </g>
</svg>
