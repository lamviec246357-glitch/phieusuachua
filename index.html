<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Phong Vũ SC">
  <meta name="application-name" content="Phong Vũ SC">
  <meta name="theme-color" content="#007bff">
  <meta name="description" content="Quản Lý Sửa Chữa & Bảo Hành - Cửa hàng Phong Vũ">
  <title>Phong Vũ – Sửa Chữa & Bảo Hành</title>

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icon-152.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
  <link rel="apple-touch-icon" sizes="167x167" href="icon-167.png">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="shortcut icon" href="icon-192.png">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root { --primary: #007bff; --primary-dark: #0056b3; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #003d99;
      overscroll-behavior: none;
      -webkit-overflow-scrolling: touch;
      -webkit-text-size-adjust: 100%;
    }

    /* ══ APP IFRAME ══ */
    #app-wrapper {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      overflow: hidden;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      background: #fff;
    }
    #app-frame {
      display: block;
      width: 100%;
      border: none;
      outline: none;
      /* Che banner Google "Ứng dụng này do một người dùng Google tạo" */
      margin-top: -45px;
      height: calc(100% + 45px);
      min-height: calc(100vh + 45px);
    }

    /* ══ LOADING SCREEN ══ */
    #loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      background: linear-gradient(145deg, #003d99 0%, #0056b3 40%, #007bff 100%);
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }
    #loader.fade-out { opacity: 0; visibility: hidden; pointer-events: none; }

    .loader-logo {
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      animation: logoIn 0.8s ease forwards;
    }
    @keyframes logoIn {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: none; }
    }
    .loader-icon {
      width: 80px; height: 80px;
      background: rgba(255,255,255,.15);
      border-radius: 22px;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid rgba(255,255,255,.3);
      box-shadow: 0 8px 32px rgba(0,0,0,.2);
    }
    .loader-icon svg { width: 48px; height: 48px; }
    .loader-name {
      color: #fff; font-family: -apple-system, 'Segoe UI', sans-serif;
      font-size: 22px; font-weight: 700; letter-spacing: .5px;
    }
    .loader-sub {
      color: rgba(255,255,255,.7); font-family: -apple-system, 'Segoe UI', sans-serif;
      font-size: 13px; margin-top: -8px;
    }

    .spinner {
      position: relative; width: 48px; height: 48px;
    }
    .spinner::before {
      content: ''; position: absolute; inset: 0;
      border-radius: 50%; border: 3px solid rgba(255,255,255,.2);
    }
    .spinner::after {
      content: ''; position: absolute; inset: 0;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: #fff;
      border-right-color: rgba(255,255,255,.5);
      animation: spin .9s cubic-bezier(.5,0,.5,1) infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ══ FACE ID OVERLAY (chạy ở tầng wrapper - domain GitHub) ══ */
    #faceOverlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 8000;
      background: rgba(0,0,0,.6);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #faceOverlay.show { display: flex; }

    .face-card {
      background: #fff;
      border-radius: 20px;
      width: 100%; max-width: 340px;
      box-shadow: 0 20px 60px rgba(0,0,0,.3);
      overflow: hidden;
      animation: cardIn .3s ease;
    }
    @keyframes cardIn {
      from { transform: scale(.95) translateY(20px); opacity: 0; }
      to   { transform: none; opacity: 1; }
    }
    .face-card-header {
      background: linear-gradient(135deg, #003d99, #007bff);
      padding: 24px 20px 20px;
      text-align: center;
      color: #fff;
    }
    .face-icon-big { font-size: 56px; margin-bottom: 8px; line-height: 1; }
    .face-card-header h2 { font-size: 18px; font-weight: 700; font-family: -apple-system,'Segoe UI',sans-serif; }
    .face-card-header p { font-size: 13px; opacity: .8; margin-top: 4px; font-family: -apple-system,'Segoe UI',sans-serif; }

    .face-card-body { padding: 20px; }
    .face-username {
      text-align: center;
      font-family: -apple-system,'Segoe UI',sans-serif;
      font-size: 15px; font-weight: 600;
      color: #333; margin-bottom: 16px;
    }
    /* Input PIN ẩn - iOS sẽ autofill bằng Face ID */
    .face-pin-wrap { position: relative; margin-bottom: 8px; }
    .face-pin-input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e0e4ea;
      border-radius: 10px;
      font-size: 22px;
      letter-spacing: 8px;
      text-align: center;
      font-family: -apple-system, sans-serif;
      outline: none;
      transition: border-color .2s;
      background: #f8f9ff;
    }
    .face-pin-input:focus { border-color: var(--primary); background: #fff; }
    .face-pin-hint {
      text-align: center;
      font-size: 12px;
      color: #888;
      margin-bottom: 16px;
      font-family: -apple-system,'Segoe UI',sans-serif;
      line-height: 1.4;
    }
    .face-pin-error {
      color: #ea4335; font-size: 13px; text-align: center;
      min-height: 18px; margin-bottom: 8px;
      font-family: -apple-system,'Segoe UI',sans-serif;
    }
    .face-card-footer {
      display: flex; gap: 10px;
      padding: 0 20px 20px;
    }
    .btn-face-cancel {
      flex: 1; padding: 13px;
      border: 1.5px solid #e0e4ea;
      border-radius: 10px;
      background: #fff; color: #555;
      font-size: 15px; font-weight: 600;
      cursor: pointer;
      font-family: -apple-system,'Segoe UI',sans-serif;
    }
    .btn-face-confirm {
      flex: 2; padding: 13px;
      background: var(--primary); color: #fff;
      border: none; border-radius: 10px;
      font-size: 15px; font-weight: 700;
      cursor: pointer;
      font-family: -apple-system,'Segoe UI',sans-serif;
      transition: background .15s;
    }
    .btn-face-confirm:hover { background: var(--primary-dark); }
    .btn-face-confirm:disabled { opacity: .6; cursor: not-allowed; }

    /* Setup PIN overlay */
    #setupOverlay {
      display: none;
      position: fixed; inset: 0; z-index: 8000;
      background: rgba(0,0,0,.6);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      align-items: center; justify-content: center; padding: 20px;
    }
    #setupOverlay.show { display: flex; }
    .setup-card {
      background: #fff; border-radius: 20px;
      width: 100%; max-width: 360px;
      box-shadow: 0 20px 60px rgba(0,0,0,.3);
      animation: cardIn .3s ease;
    }
    .setup-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid #f0f0f0;
    }
    .setup-header h2 {
      font-size: 17px; font-weight: 700; color: #1a1a2e;
      font-family: -apple-system,'Segoe UI',sans-serif;
    }
    .setup-body { padding: 16px 20px; }
    .setup-body .info-box {
      background: #e8f0fe; border-radius: 10px;
      padding: 12px 14px; margin-bottom: 16px;
      font-size: 13px; line-height: 1.5; color: #1a3a6e;
      font-family: -apple-system,'Segoe UI',sans-serif;
    }
    .setup-body label {
      display: block; font-size: 13px; font-weight: 600;
      color: #555; margin-bottom: 6px;
      font-family: -apple-system,'Segoe UI',sans-serif;
    }
    .setup-body input {
      width: 100%; padding: 12px 14px;
      border: 2px solid #e0e4ea; border-radius: 10px;
      font-size: 18px; letter-spacing: 6px; text-align: center;
      margin-bottom: 12px; outline: none;
      font-family: -apple-system, sans-serif;
      background: #f8f9ff;
      transition: border-color .2s;
    }
    .setup-body input:focus { border-color: var(--primary); background: #fff; }
    .setup-error {
      color: #ea4335; font-size: 13px; min-height: 18px;
      font-family: -apple-system,'Segoe UI',sans-serif;
    }
    .setup-footer {
      display: flex; gap: 10px; padding: 12px 20px 20px;
    }
    .btn-setup-cancel {
      flex: 1; padding: 12px;
      border: 1.5px solid #e0e4ea; border-radius: 10px;
      background: #fff; color: #555;
      font-size: 14px; font-weight: 600; cursor: pointer;
      font-family: -apple-system,'Segoe UI',sans-serif;
    }
    .btn-setup-save {
      flex: 2; padding: 12px;
      background: var(--primary); color: #fff;
      border: none; border-radius: 10px;
      font-size: 14px; font-weight: 700; cursor: pointer;
      font-family: -apple-system,'Segoe UI',sans-serif;
    }
    .btn-setup-save:disabled { opacity: .6; cursor: not-allowed; }
  </style>
</head>
<body>

  <!-- LOADING -->
  <div id="loader">
    <div class="loader-logo">
      <div class="loader-icon">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="14" y="6" width="20" height="32" rx="4" fill="white" opacity="0.95"/>
          <rect x="16" y="9" width="16" height="20" rx="2" fill="#007bff" opacity="0.3"/>
          <circle cx="24" cy="33" r="2" fill="white" opacity="0.6"/>
          <path d="M8 24 L18 14" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="7" cy="25" r="3.5" fill="none" stroke="#FFD700" stroke-width="2.2"/>
          <path d="M40 8 L30 18" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M38 6 L42 10" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
          <text x="18" y="22" font-family="Arial Black" font-size="8" font-weight="900" fill="white" opacity="0.9">PV</text>
        </svg>
      </div>
      <div class="loader-name">Phong Vũ</div>
      <div class="loader-sub">Sửa Chữa & Bảo Hành</div>
    </div>
    <div class="spinner"></div>
  </div>

  <!-- APP IFRAME -->
  <div id="app-wrapper">
    <iframe
      id="app-frame"
      src="https://script.google.com/macros/s/AKfycbwkOtnzq_NpUVEhtp8jsCPi-1_R49kgelESqaiVKu9sZO0NLQUfgdw47N4uYyD1axWR/exec"
      title="Phong Vũ Quản Lý Sửa Chữa"
      scrolling="yes"
      allow="camera; microphone; geolocation; clipboard-write"
      allowfullscreen
      loading="eager"
    ></iframe>
  </div>

  <!-- ══ FACE ID / PIN OVERLAY (chạy ở tầng GitHub - HTTPS) ══ -->
  <div id="faceOverlay">
    <div class="face-card">
      <div class="face-card-header">
        <div class="face-icon-big" id="faceIconBig">😊</div>
        <h2>Đăng nhập nhanh</h2>
        <p id="faceUserLabel">Tài khoản: </p>
      </div>
      <div class="face-card-body">
        <div class="face-pin-hint" id="facePinHint">
          Nhập mã PIN<br>
          <small style="color:#007bff">iOS sẽ dùng Face ID / Touch ID để xác nhận</small>
        </div>
        <div class="face-pin-wrap">
          <input type="password"
                 id="facePinInput"
                 inputmode="numeric"
                 maxlength="20"
                 placeholder="● ● ● ●"
                 autocomplete="current-password"
                 class="face-pin-input"
                 onkeydown="if(event.key==='Enter')confirmFaceLogin()">
        </div>
        <div class="face-pin-error" id="facePinError"></div>
      </div>
      <div class="face-card-footer">
        <button class="btn-face-cancel" onclick="closeFaceOverlay()">Hủy</button>
        <button class="btn-face-confirm" id="btnFaceConfirm" onclick="confirmFaceLogin()">
          🔒 Xác nhận
        </button>
      </div>
    </div>
  </div>

  <!-- ══ SETUP PIN OVERLAY ══ -->
  <div id="setupOverlay">
    <div class="setup-card">
      <div class="setup-header">
        <h2>🔐 Thiết lập đăng nhập nhanh</h2>
      </div>
      <div class="setup-body">
        <div class="info-box">
          💡 Tạo mã PIN để đăng nhập nhanh.<br>
          Trên iPhone, iOS sẽ tự dùng <strong>Face ID</strong> để bảo vệ và tự điền PIN — bạn không cần nhập tay.
        </div>
        <label>Mã PIN mới (tối thiểu 4 ký tự)</label>
        <input type="password" id="setupPin1" inputmode="numeric"
               maxlength="20" placeholder="Nhập PIN"
               autocomplete="new-password">
        <label>Xác nhận PIN</label>
        <input type="password" id="setupPin2" inputmode="numeric"
               maxlength="20" placeholder="Nhập lại PIN"
               autocomplete="new-password"
               onkeydown="if(event.key==='Enter')saveSetupPIN()">
        <div class="setup-error" id="setupPinError"></div>
      </div>
      <div class="setup-footer">
        <button class="btn-setup-cancel" onclick="closeSetupOverlay()">Hủy</button>
        <button class="btn-setup-save" id="btnSetupSave" onclick="saveSetupPIN()">✅ Lưu PIN</button>
      </div>
    </div>
  </div>

  <script>
  // ══════════════════════════════════════════════════════
  //  PWA WRAPPER - index.html (domain GitHub/Netlify HTTPS)
  //  Face ID hoạt động tại đây vì domain này hỗ trợ
  //  PasswordCredential API (HTTPS + không phải iframe)
  // ══════════════════════════════════════════════════════

  // ── SERVICE WORKER ────────────────────────────────────
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(r => console.log('[SW] OK:', r.scope))
        .catch(e => console.warn('[SW]', e));
    });
  }

  // ── LOADING ───────────────────────────────────────────
  const loader = document.getElementById('loader');
  const frame  = document.getElementById('app-frame');
  const loaderTO = setTimeout(() => hideLoader(), 8000);

  function hideLoader() {
    clearTimeout(loaderTO);
    loader.classList.add('fade-out');
    setTimeout(() => loader.remove(), 700);
  }
  frame.addEventListener('load',  () => setTimeout(hideLoader, 300));
  frame.addEventListener('error', () => hideLoader());

  // ── CHẶN ZOOM IOS ─────────────────────────────────────
  document.addEventListener('gesturestart',  e => e.preventDefault());
  document.addEventListener('gesturechange', e => e.preventDefault());
  document.addEventListener('touchmove', e => {
    if (e.touches.length > 1) e.preventDefault();
  }, { passive: false });

  // ── LẮNG NGHE MESSAGES TỪ IFRAME (GAS) ───────────────
  // GAS sẽ gửi postMessage để yêu cầu Face ID / setup PIN
  window.addEventListener('message', async (e) => {
    // Chỉ nhận message từ Google Script
    if (!e.origin.includes('script.google.com') &&
        !e.origin.includes('googleusercontent.com')) return;

    const { type, data } = e.data || {};
    console.log('[Wrapper] Message from GAS:', type, data);

    switch(type) {
      case 'FACE_LOGIN_REQUEST':
        // GAS yêu cầu đăng nhập bằng Face ID
        openFaceOverlay(data.username);
        break;

      case 'SETUP_PIN_REQUEST':
        // GAS yêu cầu thiết lập PIN
        openSetupOverlay();
        break;

      case 'LOGIN_SUCCESS':
        // GAS đăng nhập thành công bằng mật khẩu → lưu credential
        if (data && data.username && data.password) {
          saveCredential(data.username, data.password);
        }
        break;

      case 'CHECK_FACEID_STATUS':
        // GAS hỏi xem có credential không
        const hasCred = !!localStorage.getItem('pv_has_cred');
        const username = localStorage.getItem('pv_username') || '';
        sendToGAS({ type: 'FACEID_STATUS', hasCred, username });
        break;
    }
  });

  // Gửi message xuống iframe GAS
  function sendToGAS(msg) {
    try {
      frame.contentWindow.postMessage(msg, 'https://script.google.com');
    } catch(e) {
      console.warn('[Wrapper] postMessage failed:', e);
    }
  }

  // ══ FACE ID - MỞ OVERLAY ════════════════════════════
  function openFaceOverlay(username) {
    document.getElementById('faceUserLabel').textContent = 'Tài khoản: ' + (username || '');
    document.getElementById('facePinError').textContent = '';
    document.getElementById('facePinInput').value = '';
    document.getElementById('faceOverlay').classList.add('show');

    // Thử PasswordCredential trước (iOS sẽ bật Face ID tự động)
    tryPasswordCredential(username);
  }

  async function tryPasswordCredential(username) {
    if (!window.PasswordCredential || !navigator.credentials) return;
    try {
      // mediation: 'required' → bắt buộc iOS hiện Face ID dialog
      const cred = await navigator.credentials.get({
        password: true,
        mediation: 'required'
      });
      if (cred && cred.password) {
        // iOS đã xác thực Face ID → tự điền và submit
        document.getElementById('facePinInput').value = cred.password;
        document.getElementById('facePinHint').innerHTML =
          '✅ Face ID xác thực thành công!';
        setTimeout(() => {
          sendLoginToGAS(cred.id || username, cred.password);
        }, 500);
      }
    } catch(e) {
      if (e.name === 'NotAllowedError') {
        // Người dùng hủy Face ID → để họ tự nhập PIN
        console.log('[FaceID] User cancelled');
      }
      // Các lỗi khác: browser không hỗ trợ → giữ nguyên form nhập PIN
    }
  }

  function closeFaceOverlay() {
    document.getElementById('faceOverlay').classList.remove('show');
    document.getElementById('facePinInput').value = '';
    document.getElementById('facePinError').textContent = '';
  }

  function confirmFaceLogin() {
    const pin = document.getElementById('facePinInput').value.trim();
    const username = localStorage.getItem('pv_username') || '';
    if (!pin) {
      document.getElementById('facePinError').textContent = 'Vui lòng nhập PIN';
      return;
    }
    sendLoginToGAS(username, pin);
  }

  function sendLoginToGAS(username, password) {
    document.getElementById('btnFaceConfirm').disabled = true;
    document.getElementById('btnFaceConfirm').textContent = '⏳ Đang xác thực...';

    // Gửi thông tin đăng nhập xuống iframe GAS
    sendToGAS({
      type: 'DO_LOGIN',
      username: username,
      password: password
    });

    // Chờ phản hồi từ GAS
    const timeout = setTimeout(() => {
      document.getElementById('btnFaceConfirm').disabled = false;
      document.getElementById('btnFaceConfirm').textContent = '🔒 Xác nhận';
      document.getElementById('facePinError').textContent = 'Hết thời gian. Thử lại.';
    }, 15000);

    // Lắng nghe kết quả
    const handler = (e) => {
      if (!e.origin.includes('script.google.com') && !e.origin.includes('googleusercontent.com')) return;
      const { type, success, message } = e.data || {};
      if (type !== 'LOGIN_RESULT') return;
      clearTimeout(timeout);
      window.removeEventListener('message', handler);
      document.getElementById('btnFaceConfirm').disabled = false;
      document.getElementById('btnFaceConfirm').textContent = '🔒 Xác nhận';
      if (success) {
        closeFaceOverlay();
      } else {
        document.getElementById('facePinError').textContent = '❌ ' + (message || 'PIN không đúng');
      }
    };
    window.addEventListener('message', handler);
  }

  // ══ LƯU CREDENTIAL CHO FACE ID ═════════════════════
  async function saveCredential(username, password) {
    localStorage.setItem('pv_username', username);
    localStorage.setItem('pv_has_cred', '1');

    if (!window.PasswordCredential || !navigator.credentials) return;
    try {
      const cred = new PasswordCredential({
        id: username,
        password: password,
        name: 'Phong Vũ SC - ' + username,
        iconURL: window.location.origin + '/icon-192.png',
      });
      await navigator.credentials.store(cred);
      console.log('[FaceID] Credential stored — iOS Keychain / Face ID ready');
    } catch(e) {
      console.warn('[FaceID] Store failed:', e);
    }
  }

  // ══ SETUP PIN OVERLAY ════════════════════════════════
  function openSetupOverlay() {
    document.getElementById('setupPin1').value = '';
    document.getElementById('setupPin2').value = '';
    document.getElementById('setupPinError').textContent = '';
    document.getElementById('setupOverlay').classList.add('show');
    setTimeout(() => document.getElementById('setupPin1').focus(), 300);
  }

  function closeSetupOverlay() {
    document.getElementById('setupOverlay').classList.remove('show');
  }

  async function saveSetupPIN() {
    const pin1 = document.getElementById('setupPin1').value.trim();
    const pin2 = document.getElementById('setupPin2').value.trim();
    const errEl = document.getElementById('setupPinError');

    if (pin1.length < 4) { errEl.textContent = 'PIN phải ít nhất 4 ký tự'; return; }
    if (pin1 !== pin2)   { errEl.textContent = 'Hai PIN không khớp'; return; }

    document.getElementById('btnSetupSave').disabled = true;

    // Lấy username từ GAS
    const username = localStorage.getItem('pv_username') || 'admin';

    // Lưu PIN vào Credential Manager (iOS Keychain → Face ID)
    await saveCredential(username, pin1);

    // Gửi PIN xuống GAS để lưu server-side
    sendToGAS({ type: 'SAVE_PIN', username, pin: pin1 });

    localStorage.setItem('pv_has_cred', '1');
    closeSetupOverlay();

    // Báo GAS biết đã setup xong
    sendToGAS({ type: 'SETUP_PIN_DONE', username });
    document.getElementById('btnSetupSave').disabled = false;
  }

  // ══ STANDALONE PWA CHECK ════════════════════════════
  if (window.navigator.standalone) {
    document.documentElement.style.height = '100%';
    document.body.style.height = '100%';
  }
  </script>
</body>
</html>
