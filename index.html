<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Phong Vũ SC">
  <meta name="theme-color" content="#1a73e8">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <title>Phong Vũ – Sửa Chữa & Bảo Hành</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:#fff;
  -webkit-text-size-adjust:100%;
  overscroll-behavior:none;
}
/* ★ VẤN ĐỀ 1: Xóa loading screen — iframe hiển thị ngay lập tức */
/* APP WRAPPER: chiếm toàn màn hình */
#appWrap{
  position:fixed;
  top:0; left:0; right:0; bottom:0;
  overflow:hidden;
  background:#1a73e8; /* màu nền trong lúc iframe load */
}
#appFrame{
  display:block;
  width:100%;
  border:none;outline:none;
  /* Che banner Google */
  margin-top:-45px;
  height:calc(100% + 45px);
}
</style>
</head>
<body>

<!-- Không có loading screen — iframe hiện ngay -->
<div id="appWrap">
  <iframe id="appFrame"
    src="https://script.google.com/macros/s/AKfycbwkOtnzq_NpUVEhtp8jsCPi-1_R49kgelESqaiVKu9sZO0NLQUfgdw47N4uYyD1axWR/exec"
    scrolling="yes"
    allow="camera;microphone;geolocation;clipboard-write"
    allowfullscreen
    loading="eager">
  </iframe>
</div>

<script>
// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

// Chặn zoom iOS
document.addEventListener('gesturestart',  e=>e.preventDefault());
document.addEventListener('gesturechange', e=>e.preventDefault());
document.addEventListener('touchmove', e=>{
  if(e.touches.length>1) e.preventDefault();
},{passive:false});

// Nhận credential từ GAS để lưu (không dùng nữa nhưng giữ để tương thích)
window.addEventListener('message', async e=>{
  if(!e.origin.includes('google.com')) return;
  if(e.data && e.data.type==='PV_LOGIN_SUCCESS' && window.PasswordCredential && window.isSecureContext) {
    try {
      const c=new PasswordCredential({id:e.data.username,password:e.data.password,name:'Phong Vũ SC'});
      await navigator.credentials.store(c);
    } catch(err){}
  }
});
</script>
</body>
</html>
